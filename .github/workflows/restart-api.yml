name: Restart API

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: production
        type: choice
        options:
          - staging
          - production

jobs:
  restart_api_staging:
    name: Restart API (Staging)
    runs-on: ubuntu-latest
    if: inputs.environment == 'staging'
    environment: staging
    steps:
      - name: Restart api + worker
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: ${{ secrets.STAGING_PORT }}
          command_timeout: 5m
          script_stop: true
          script: |
            cd "${{ secrets.STAGING_APP_DIR }}"
            docker compose -f infra/docker-compose.full.yml restart api worker
            docker compose -f infra/docker-compose.full.yml ps api worker
            curl -fsS http://localhost:4000/api/health >/dev/null
            echo "API restarted successfully"

  restart_api_production:
    name: Restart API (Production)
    runs-on: ubuntu-latest
    if: inputs.environment == 'production'
    environment: production
    steps:
      - name: Restart api + worker
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_PORT }}
          command_timeout: 5m
          script_stop: true
          script: |
            cd "${{ secrets.PROD_APP_DIR }}"
            docker compose -f infra/docker-compose.full.yml restart api worker
            docker compose -f infra/docker-compose.full.yml ps api worker
            curl -fsS http://localhost:4000/api/health >/dev/null
            echo "API restarted successfully"
