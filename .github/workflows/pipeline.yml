name: Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      target:
        description: Deploy target
        required: true
        default: production
        type: choice
        options:
          - staging
          - production

jobs:
  ci_gates:
    name: CI Gates
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: typo
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d typo"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    env:
      NODE_ENV: test
      APP_BASE_URL: http://localhost:8080
      JWT_SECRET: 12345678901234567890123456789012
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/typo
      REDIS_URL: redis://localhost:6379
      VITE_API_URL: http://localhost:4000
      VITE_SUPABASE_URL: https://example.supabase.co
      VITE_SUPABASE_ANON_KEY: example-anon-key
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Wait for Postgres
        run: |
          for attempt in $(seq 1 30); do
            if pg_isready -h localhost -U postgres -d typo; then
              exit 0
            fi
            sleep 2
          done
          echo "Postgres did not become ready in time"
          exit 1

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run migrations
        run: npm run db:migrate

      - name: Check migration status
        run: npm run db:migrate:status

  build_and_publish:
    name: Build And Publish Images
    runs-on: ubuntu-latest
    needs: ci_gates
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write
    outputs:
      deploy_target: ${{ steps.meta.outputs.deploy_target }}
      api_image: ${{ steps.image_refs.outputs.api_image }}
      web_image: ${{ steps.image_refs.outputs.web_image }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set deployment metadata
        id: meta
        shell: bash
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            target="${{ inputs.target }}"
          elif [[ "${GITHUB_REF_NAME}" == "develop" ]]; then
            target="staging"
          else
            target="production"
          fi
          echo "image_prefix=ghcr.io/${owner}" >> "$GITHUB_OUTPUT"
          echo "deploy_target=${target}" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push API image
        id: build_api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image_prefix }}/wagen-api:${{ github.sha }}
            ${{ steps.meta.outputs.image_prefix }}/wagen-api:${{ steps.meta.outputs.deploy_target }}-latest

      - name: Build and push web image
        id: build_web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=
            VITE_SUPABASE_URL=${{ steps.meta.outputs.deploy_target == 'production' && secrets.PROD_VITE_SUPABASE_URL || secrets.STAGING_VITE_SUPABASE_URL }}
            VITE_SUPABASE_ANON_KEY=${{ steps.meta.outputs.deploy_target == 'production' && secrets.PROD_VITE_SUPABASE_ANON_KEY || secrets.STAGING_VITE_SUPABASE_ANON_KEY }}
          tags: |
            ${{ steps.meta.outputs.image_prefix }}/wagen-web:${{ github.sha }}
            ${{ steps.meta.outputs.image_prefix }}/wagen-web:${{ steps.meta.outputs.deploy_target }}-latest

      - name: Publish immutable image refs
        id: image_refs
        shell: bash
        run: |
          echo "api_image=${{ steps.meta.outputs.image_prefix }}/wagen-api@${{ steps.build_api.outputs.digest }}" >> "$GITHUB_OUTPUT"
          echo "web_image=${{ steps.meta.outputs.image_prefix }}/wagen-web@${{ steps.build_web.outputs.digest }}" >> "$GITHUB_OUTPUT"

  deploy_staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: build_and_publish
    if: needs.build_and_publish.outputs.deploy_target == 'staging'
    environment: staging
    steps:
      - name: Deploy staging
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: ${{ secrets.STAGING_PORT }}
          script_stop: true
          script: |
            cd "${{ secrets.STAGING_APP_DIR }}"
            APP_DIR="${{ secrets.STAGING_APP_DIR }}" \
            DEPLOY_BRANCH="develop" \
            REGISTRY_USERNAME="${{ secrets.STAGING_REGISTRY_USERNAME }}" \
            REGISTRY_PASSWORD="${{ secrets.STAGING_REGISTRY_PASSWORD }}" \
            API_IMAGE="${{ needs.build_and_publish.outputs.api_image }}" \
            WEB_IMAGE="${{ needs.build_and_publish.outputs.web_image }}" \
            bash tools/deploy/remote-deploy.sh

  deploy_production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: build_and_publish
    if: needs.build_and_publish.outputs.deploy_target == 'production'
    environment: production
    steps:
      - name: Deploy production
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_PORT }}
          script_stop: true
          script: |
            cd "${{ secrets.PROD_APP_DIR }}"
            APP_DIR="${{ secrets.PROD_APP_DIR }}" \
            DEPLOY_BRANCH="main" \
            REGISTRY_USERNAME="${{ secrets.PROD_REGISTRY_USERNAME }}" \
            REGISTRY_PASSWORD="${{ secrets.PROD_REGISTRY_PASSWORD }}" \
            API_IMAGE="${{ needs.build_and_publish.outputs.api_image }}" \
            WEB_IMAGE="${{ needs.build_and_publish.outputs.web_image }}" \
            bash tools/deploy/remote-deploy.sh
