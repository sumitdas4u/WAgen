name: CI-CD Pipeline

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
      - main
  workflow_dispatch:
    inputs:
      target:
        description: Deployment target
        required: true
        type: choice
        default: none
        options:
          - none
          - staging
          - production

permissions:
  contents: read
  packages: write

jobs:
  ci:
    name: CI Gates
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: typo
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d typo"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/typo
      JWT_SECRET: 01234567890123456789012345678901
      APP_BASE_URL: http://localhost:8080
      REDIS_URL: redis://localhost:6379
      METRICS_ENABLED: "false"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Lint root workspaces
        run: npm run lint

      - name: Build root workspaces
        run: npm run build

      - name: Ensure Postgres client is available
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Wait for postgres readiness
        env:
          PGPASSWORD: postgres
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U postgres -d typo; then
              exit 0
            fi
            sleep 2
          done
          echo "Postgres did not become ready in time"
          exit 1

      - name: Validate database migrations
        run: |
          npm run db:migrate
          npm run db:migrate:status

  build_and_push_images:
    name: Build and Push Images
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: ci
    if: >
      (github.event_name == 'push' && (github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target != 'none')
    outputs:
      api_image: ${{ steps.image_refs.outputs.api_image }}
      web_image: ${{ steps.image_refs.outputs.web_image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image names
        id: meta
        run: |
          OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          BRANCH_TAG="$(echo "${GITHUB_REF_NAME}" | tr '/' '-')"
          echo "api_repo=ghcr.io/${OWNER_LC}/typo-api" >> "$GITHUB_OUTPUT"
          echo "web_repo=ghcr.io/${OWNER_LC}/typo-web" >> "$GITHUB_OUTPUT"
          echo "branch_tag=${BRANCH_TAG}" >> "$GITHUB_OUTPUT"

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        id: build_api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.api_repo }}:${{ github.sha }}
            ${{ steps.meta.outputs.api_repo }}:${{ steps.meta.outputs.branch_tag }}-latest
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      - name: Build and push Web image
        id: build_web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          build-args: |
            VITE_API_URL=
          tags: |
            ${{ steps.meta.outputs.web_repo }}:${{ github.sha }}
            ${{ steps.meta.outputs.web_repo }}:${{ steps.meta.outputs.branch_tag }}-latest
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Compose immutable image refs
        id: image_refs
        run: |
          echo "api_image=${{ steps.meta.outputs.api_repo }}@${{ steps.build_api.outputs.digest }}" >> "$GITHUB_OUTPUT"
          echo "web_image=${{ steps.meta.outputs.web_repo }}@${{ steps.build_web.outputs.digest }}" >> "$GITHUB_OUTPUT"

  deploy_staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build_and_push_images
    if: >
      (github.event_name == 'push' && github.ref == 'refs/heads/develop') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'staging')
    environment:
      name: staging
    concurrency:
      group: deploy-staging
      cancel-in-progress: false
    steps:
      - name: Deploy staging via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: ${{ secrets.STAGING_PORT }}
          script_stop: true
          script: |
            APP_DIR='${{ secrets.STAGING_APP_DIR }}'
            DEPLOY_BRANCH='develop'
            cd "$APP_DIR"
            git fetch origin --prune
            git checkout "$DEPLOY_BRANCH"
            git pull --ff-only origin "$DEPLOY_BRANCH"
            export APP_DIR DEPLOY_BRANCH
            export SKIP_GIT_SYNC='1'
            export DEPLOY_COMPOSE_FILE='infra/docker-compose.deploy.yml'
            export API_IMAGE='${{ needs.build_and_push_images.outputs.api_image }}'
            export WEB_IMAGE='${{ needs.build_and_push_images.outputs.web_image }}'
            export REGISTRY_HOST='ghcr.io'
            export REGISTRY_USERNAME='${{ secrets.STAGING_REGISTRY_USERNAME }}'
            export REGISTRY_PASSWORD='${{ secrets.STAGING_REGISTRY_PASSWORD }}'
            export RUN_DB_MIGRATE='1'
            bash "$APP_DIR/tools/deploy/remote-deploy.sh"

  deploy_production:
    name: Deploy Production
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build_and_push_images
    if: >
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'production')
    environment:
      name: production
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Deploy production via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_PORT }}
          script_stop: true
          script: |
            APP_DIR='${{ secrets.PROD_APP_DIR }}'
            DEPLOY_BRANCH='main'
            cd "$APP_DIR"
            git fetch origin --prune
            git checkout "$DEPLOY_BRANCH"
            git pull --ff-only origin "$DEPLOY_BRANCH"
            export APP_DIR DEPLOY_BRANCH
            export SKIP_GIT_SYNC='1'
            export DEPLOY_COMPOSE_FILE='infra/docker-compose.deploy.yml'
            export API_IMAGE='${{ needs.build_and_push_images.outputs.api_image }}'
            export WEB_IMAGE='${{ needs.build_and_push_images.outputs.web_image }}'
            export REGISTRY_HOST='ghcr.io'
            export REGISTRY_USERNAME='${{ secrets.PROD_REGISTRY_USERNAME }}'
            export REGISTRY_PASSWORD='${{ secrets.PROD_REGISTRY_PASSWORD }}'
            export RUN_DB_MIGRATE='1'
            bash "$APP_DIR/tools/deploy/remote-deploy.sh"
