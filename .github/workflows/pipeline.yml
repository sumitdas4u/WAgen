name: Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      target:
        description: Deploy target
        required: true
        default: production
        type: choice
        options:
          - staging
          - production

jobs:
  ci_gates:
    name: CI Gates
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: typo
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d typo"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    env:
      NODE_ENV: test
      APP_BASE_URL: http://localhost:8080
      JWT_SECRET: 12345678901234567890123456789012
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/typo
      REDIS_URL: redis://localhost:6379
      VITE_API_URL: http://localhost:4000
      VITE_SUPABASE_URL: https://rbuvaekbwvkcaoffkzum.supabase.co
      VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJidXZhZWtid3ZrY2FvZmZrenVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NTM3MzUsImV4cCI6MjA5MDAyOTczNX0.rQJq3RdLOk8KuxBXjfBh5IgY_CJ6gxSgJ-i5oZ01DVc
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Wait for Postgres
        run: |
          for attempt in $(seq 1 30); do
            if pg_isready -h localhost -U postgres -d typo; then
              exit 0
            fi
            sleep 2
          done
          echo "Postgres did not become ready in time"
          exit 1

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Run migrations
        run: npm run db:migrate

      - name: Check migration status
        run: npm run db:migrate:status

  deploy_staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: ci_gates
    if: (github.event_name == 'push' && github.ref_name == 'develop') || (github.event_name == 'workflow_dispatch' && inputs.target == 'staging')
    environment: staging
    steps:
      - name: Deploy staging
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: ${{ secrets.STAGING_PORT }}
          command_timeout: 30m
          script_stop: true
          script: |
            cd "${{ secrets.STAGING_APP_DIR }}"
            git fetch origin --prune
            git checkout develop
            git pull --ff-only origin develop
            export COMPOSE_BAKE=false
            cat > apps/web/.env <<'EOF'
            VITE_API_URL=http://api:4000
            VITE_SUPABASE_URL=https://rbuvaekbwvkcaoffkzum.supabase.co
            VITE_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJidXZhZWtid3ZrY2FvZmZrenVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NTM3MzUsImV4cCI6MjA5MDAyOTczNX0.rQJq3RdLOk8KuxBXjfBh5IgY_CJ6gxSgJ-i5oZ01DVc
            EOF
            set -a
            if [ -f apps/web/.env ]; then . apps/web/.env; fi
            set +a
            docker compose -f infra/docker-compose.full.yml up -d postgres redis
            docker compose -f infra/docker-compose.full.yml build api web
            docker compose -f infra/docker-compose.full.yml run --rm api node apps/api/dist/scripts/migrate.js
            docker compose -f infra/docker-compose.full.yml up -d --wait --wait-timeout 120 api web
            curl -fsS http://localhost:4000/api/health >/dev/null

  deploy_production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: ci_gates
    if: (github.event_name == 'push' && github.ref_name == 'main') || (github.event_name == 'workflow_dispatch' && inputs.target == 'production')
    environment: production
    steps:
      - name: Deploy production
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_PORT }}
          command_timeout: 30m
          script_stop: true
          script: |
            cd "${{ secrets.PROD_APP_DIR }}"
            git fetch origin --prune
            git checkout main
            git pull --ff-only origin main
            export COMPOSE_BAKE=false
            cat > apps/web/.env <<'EOF'
            VITE_API_URL=http://api:4000
            VITE_SUPABASE_URL=https://rbuvaekbwvkcaoffkzum.supabase.co
            VITE_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJidXZhZWtid3ZrY2FvZmZrenVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NTM3MzUsImV4cCI6MjA5MDAyOTczNX0.rQJq3RdLOk8KuxBXjfBh5IgY_CJ6gxSgJ-i5oZ01DVc
            EOF
            set -a
            if [ -f apps/web/.env ]; then . apps/web/.env; fi
            set +a
            docker compose -f infra/docker-compose.full.yml up -d postgres redis
            docker compose -f infra/docker-compose.full.yml build api web
            docker compose -f infra/docker-compose.full.yml run --rm api node apps/api/dist/scripts/migrate.js
            docker compose -f infra/docker-compose.full.yml up -d --wait --wait-timeout 120 api web
            curl -fsS http://localhost:4000/api/health >/dev/null
