name: Rebuild Containers

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: production
        type: choice
        options:
          - staging
          - production

jobs:
  rebuild_staging:
    name: Rebuild All (Staging)
    runs-on: ubuntu-latest
    if: inputs.environment == 'staging'
    environment: staging
    steps:
      - name: Rebuild and redeploy all containers
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          port: ${{ secrets.STAGING_PORT }}
          command_timeout: 30m
          script_stop: true
          script: |
            cd "${{ secrets.STAGING_APP_DIR }}"
            git fetch origin --prune
            git checkout develop
            git pull --ff-only origin develop
            export COMPOSE_BAKE=false
            cat > apps/web/.env <<'EOF'
            VITE_API_URL=http://api:4000
            VITE_SUPABASE_URL=https://rbuvaekbwvkcaoffkzum.supabase.co
            VITE_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJidXZhZWtid3ZrY2FvZmZrenVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NTM3MzUsImV4cCI6MjA5MDAyOTczNX0.rQJq3RdLOk8KuxBXjfBh5IgY_CJ6gxSgJ-i5oZ01DVc
            EOF
            set -a
            if [ -f apps/web/.env ]; then . apps/web/.env; fi
            set +a
            docker compose -f infra/docker-compose.full.yml up -d postgres redis
            docker compose -f infra/docker-compose.full.yml build --no-cache api web worker
            docker compose -f infra/docker-compose.full.yml run --rm api node apps/api/dist/scripts/migrate.js
            docker compose -f infra/docker-compose.full.yml up -d --wait --wait-timeout 120 api web worker
            curl -fsS http://localhost:4000/api/health >/dev/null
            echo "Full rebuild completed successfully"

  rebuild_production:
    name: Rebuild All (Production)
    runs-on: ubuntu-latest
    if: inputs.environment == 'production'
    environment: production
    steps:
      - name: Rebuild and redeploy all containers
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PROD_HOST }}
          username: ${{ secrets.PROD_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          port: ${{ secrets.PROD_PORT }}
          command_timeout: 30m
          script_stop: true
          script: |
            cd "${{ secrets.PROD_APP_DIR }}"
            git fetch origin --prune
            git checkout main
            git pull --ff-only origin main
            export COMPOSE_BAKE=false
            cat > apps/web/.env <<'EOF'
            VITE_API_URL=http://api:4000
            VITE_SUPABASE_URL=https://rbuvaekbwvkcaoffkzum.supabase.co
            VITE_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJidXZhZWtid3ZrY2FvZmZrenVtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0NTM3MzUsImV4cCI6MjA5MDAyOTczNX0.rQJq3RdLOk8KuxBXjfBh5IgY_CJ6gxSgJ-i5oZ01DVc
            EOF
            set -a
            if [ -f apps/web/.env ]; then . apps/web/.env; fi
            set +a
            docker compose -f infra/docker-compose.full.yml up -d postgres redis
            docker compose -f infra/docker-compose.full.yml build --no-cache api web worker
            docker compose -f infra/docker-compose.full.yml run --rm api node apps/api/dist/scripts/migrate.js
            docker compose -f infra/docker-compose.full.yml up -d --wait --wait-timeout 120 api web worker
            curl -fsS http://localhost:4000/api/health >/dev/null
            echo "Full rebuild completed successfully"
