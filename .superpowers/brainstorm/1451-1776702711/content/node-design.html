<h2>Redesigned Flow Start node</h2>
<p class="subtitle">Does this layout match what you had in mind?</p>

<div class="mockup">
  <div class="mockup-header">Flow Start — with keyword routes</div>
  <div class="mockup-body" style="display:flex;justify-content:center;padding:24px">
    <div style="position:relative">
      <!-- Node -->
      <div style="background:#fff;border:2px solid #0d9488;border-radius:12px;padding:14px 16px;width:260px;font-family:sans-serif;font-size:12px;box-shadow:0 4px 16px rgba(0,0,0,0.08)">

        <!-- Header -->
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
          <span style="font-weight:700;color:#0d9488;font-size:13px">▶ Flow Start</span>
          <div style="display:flex;gap:6px;color:#94a3b8">✏️ ⧉ ✕</div>
        </div>

        <!-- Flow Label -->
        <div style="margin-bottom:10px">
          <div style="font-size:10px;font-weight:600;color:#94a3b8;letter-spacing:0.05em;margin-bottom:4px">FLOW LABEL</div>
          <div style="border:1px solid #e2e8f0;border-radius:6px;padding:5px 9px;color:#374151">My Bot</div>
        </div>

        <!-- Welcome Message -->
        <div style="margin-bottom:12px">
          <div style="font-size:10px;font-weight:600;color:#94a3b8;letter-spacing:0.05em;margin-bottom:4px">WELCOME MESSAGE</div>
          <div style="border:1px solid #e2e8f0;border-radius:6px;padding:5px 9px;color:#94a3b8;font-style:italic">Optional greeting...</div>
        </div>

        <!-- Routes -->
        <div style="font-size:10px;font-weight:600;color:#94a3b8;letter-spacing:0.05em;margin-bottom:6px">KEYWORD ROUTES</div>

        <!-- Route 1: Greeting -->
        <div style="border:1px solid #86efac;background:#f0fdf4;border-radius:8px;padding:8px 10px;margin-bottom:6px;position:relative">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
            <input style="border:1px solid #d1fae5;border-radius:4px;padding:3px 7px;font-size:11px;font-weight:600;color:#166534;background:#fff;width:100%" value="Greeting" />
            <button style="border:none;background:none;color:#94a3b8;cursor:pointer;font-size:12px">✕</button>
          </div>
          <div style="display:flex;align-items:center;gap:4px;margin-bottom:4px">
            <select style="border:1px solid #e2e8f0;border-radius:4px;padding:3px 5px;font-size:10px;color:#374151;background:#fff">
              <option>Keyword</option>
            </select>
            <input style="border:1px solid #e2e8f0;border-radius:4px;padding:3px 7px;font-size:11px;flex:1;background:#fff" value="hello" />
            <button style="border:none;background:none;color:#94a3b8;font-size:11px">✕</button>
          </div>
          <div style="display:flex;align-items:center;gap:4px;margin-bottom:4px">
            <select style="border:1px solid #e2e8f0;border-radius:4px;padding:3px 5px;font-size:10px;color:#374151;background:#fff">
              <option>Keyword</option>
            </select>
            <input style="border:1px solid #e2e8f0;border-radius:4px;padding:3px 7px;font-size:11px;flex:1;background:#fff" value="hi" />
            <button style="border:none;background:none;color:#94a3b8;font-size:11px">✕</button>
          </div>
          <button style="background:none;border:1px dashed #86efac;border-radius:4px;padding:2px 8px;font-size:10px;color:#16a34a;cursor:pointer;width:100%">+ trigger</button>
          <!-- Handle dot -->
          <div style="position:absolute;right:-10px;top:50%;transform:translateY(-50%);width:14px;height:14px;background:#0d9488;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 1px #0d9488"></div>
        </div>

        <!-- Route 2: Orders -->
        <div style="border:1px solid #93c5fd;background:#eff6ff;border-radius:8px;padding:8px 10px;margin-bottom:6px;position:relative">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:6px">
            <input style="border:1px solid #bfdbfe;border-radius:4px;padding:3px 7px;font-size:11px;font-weight:600;color:#1e40af;background:#fff;width:100%" value="Orders" />
            <button style="border:none;background:none;color:#94a3b8;cursor:pointer;font-size:12px">✕</button>
          </div>
          <div style="display:flex;align-items:center;gap:4px;margin-bottom:4px">
            <select style="border:1px solid #e2e8f0;border-radius:4px;padding:3px 5px;font-size:10px;color:#374151;background:#fff">
              <option>Keyword</option>
            </select>
            <input style="border:1px solid #e2e8f0;border-radius:4px;padding:3px 7px;font-size:11px;flex:1;background:#fff" value="order" />
            <button style="border:none;background:none;color:#94a3b8;font-size:11px">✕</button>
          </div>
          <button style="background:none;border:1px dashed #93c5fd;border-radius:4px;padding:2px 8px;font-size:10px;color:#2563eb;cursor:pointer;width:100%">+ trigger</button>
          <div style="position:absolute;right:-10px;top:50%;transform:translateY(-50%);width:14px;height:14px;background:#3b82f6;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 1px #3b82f6"></div>
        </div>

        <!-- + Add Route -->
        <button style="background:none;border:1px dashed #0d9488;border-radius:6px;padding:4px 0;font-size:11px;color:#0d9488;cursor:pointer;width:100%;margin-bottom:8px">+ Add Route</button>

        <!-- Default / Fallback -->
        <div style="border:1px dashed #fbbf24;background:#fffbeb;border-radius:8px;padding:8px 10px;position:relative">
          <div style="font-size:10px;font-weight:600;color:#92400e;margin-bottom:6px">DEFAULT (no match)</div>
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer;color:#374151">
            <input type="checkbox" checked style="accent-color:#0d9488" />
            <span>Use AI when no route matches</span>
          </label>
          <div style="position:absolute;right:-10px;top:50%;transform:translateY(-50%);width:14px;height:14px;background:#f59e0b;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 1px #f59e0b"></div>
        </div>

      </div>

      <!-- Connection lines hint -->
      <div style="position:absolute;right:-120px;top:110px;font-size:10px;color:#64748b;font-family:sans-serif">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:28px">
          <div style="width:24px;height:1px;background:#0d9488"></div>
          <span style="background:#f0fdf4;border:1px solid #86efac;border-radius:4px;padding:2px 8px;color:#166534">Greeting node</span>
        </div>
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:40px">
          <div style="width:24px;height:1px;background:#3b82f6"></div>
          <span style="background:#eff6ff;border:1px solid #93c5fd;border-radius:4px;padding:2px 8px;color:#1e40af">Orders node</span>
        </div>
        <div style="display:flex;align-items:center;gap:6px">
          <div style="width:24px;height:1px;background:#f59e0b"></div>
          <span style="background:#fffbeb;border:1px solid #fbbf24;border-radius:4px;padding:2px 8px;color:#92400e">Fallback / AI</span>
        </div>
      </div>
    </div>
  </div>
</div>
